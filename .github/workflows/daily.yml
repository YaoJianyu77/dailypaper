name: Daily Papers

"on":
  workflow_dispatch:

permissions:
  contents: write
  models: read
  pages: write
  id-token: write

concurrency:
  group: daily-papers
  cancel-in-progress: true

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Search papers
        env:
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: |
          CONFIG_PATH="config.yaml"
          if [ ! -f "$CONFIG_PATH" ]; then
            CONFIG_PATH="config.example.yaml"
          fi
          python start-my-day/scripts/search_arxiv.py \
            --config "$CONFIG_PATH" \
            --output state/arxiv_filtered.json \
            --max-results 200 \
            --top-n 10 \
            --categories "cs.AI,cs.LG,cs.CL,cs.CV,cs.MM,cs.MA,cs.RO"

      - name: AI enrich papers
        env:
          AI_PROVIDER: github_models
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          GITHUB_MODELS_PREFERRED_MODELS: ${{ vars.GITHUB_MODELS_PREFERRED_MODELS }}
          GITHUB_MODELS_API_BASE: ${{ vars.GITHUB_MODELS_API_BASE }}
        run: |
          CONFIG_PATH="config.yaml"
          if [ ! -f "$CONFIG_PATH" ]; then
            CONFIG_PATH="config.example.yaml"
          fi
          python scripts/ai_enrich.py \
            --config "$CONFIG_PATH" \
            --input state/arxiv_filtered.json \
            --output state/arxiv_enriched.json

      - name: Show AI enrichment metadata
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path('state/arxiv_enriched.json').read_text(encoding='utf-8'))
          info = payload.get('ai_enrichment', {})
          print('AI enrichment metadata:')
          print(json.dumps(info, ensure_ascii=False, indent=2))
          PY

      - name: Publish daily content
        run: python scripts/publish_daily.py --input state/arxiv_enriched.json

      - name: Build static site
        run: |
          SITE_BASE_URL=""
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          if [ "$REPO_NAME" != "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            SITE_BASE_URL="/$REPO_NAME"
          fi
          export SITE_BASE_URL
          python scripts/build_site.py --output-dir dist

      - name: Commit generated content
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add content state
          if git diff --cached --quiet; then
            echo "No content changes detected."
          else
            git commit -m "chore: update daily paper content"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
