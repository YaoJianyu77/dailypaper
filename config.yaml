site:
  title: "DailyPaper"
  timezone: "America/New_York"
  base_url: ""
  show_papers_nav: false

build:
  output_dir: "dist"
  content_dir: "content"

ai:
  enabled: true
  provider: "github_models"
  model: "auto"
  skill_paths:
    - "skills/daily-paper-search/SKILL.md"
    - "skills/daily-paper-editor/SKILL.md"
    - "skills/paper-note-search/SKILL.md"
    - "skills/paper-image-extractor/SKILL.md"
  github_models_api_base: "https://models.github.ai"
  github_models_paper_limit: 6
  github_models_abstract_chars: 1200
  codex_paper_limit: 6
  codex_abstract_chars: 2200
  codex_timeout_seconds: 1200
  preferred_models:
    - "openai/gpt-5.4"
    - "openai/gpt-5"
    - "openai/gpt-4.1"
    - "openai/gpt-4o"
  timeout_seconds: 240
  max_output_tokens: 7000
  editorial_preferences:
    audience: "关注 LLM systems、推理加速、编译器与低层代码生成的研究者和工程师"
    tone: "简洁、直接、判断导向，像 systems reading notes"
    overview_goal: "优先指出今天最值得看的 systems 主线，再给出最清楚的阅读顺序"
    daily_brief_style: "像系统研究组内部日报，不像宣传文案"
    prioritize:
      - "把每篇论文压成一段短而准的 mini analysis，帮助快速判断读不读"
      - "延迟、吞吐、显存、带宽或 kernel 级收益到底来自哪里"
      - "硬件假设、实验设置、baseline 公平性和可复现性"
    avoid:
      - "空泛赞美"
      - "复述标题"
      - "字段之间重复改写同一个意思"
      - "把普通代码生成说成系统创新"
      - "编造实验细节、数字或作者背景"
    custom_instruction: "优先关注 LLM inference acceleration、serving efficiency、CUDA kernel generation、PTX/SASS/assembly-level code generation、compiler/runtime co-design。summary_zh 要能直接作为日报里的主体短评；background/problem/approach/evidence/value 各写一条互补信息，不要重复铺陈。"

publish:
  link_keywords_to_notes: false

search:
  max_results: 200
  top_n: 6
  recent_window_days: 30
  hot_window_days: 365
  hot_exclude_recent_days: 30
  hot_top_k_per_category: 3
  hot_fallback_max_results: 80
  metadata_fallbacks:
    google_scholar_enabled: true
    google_scholar_request_interval_seconds: 4.0
    google_scholar_min_title_similarity: 0.72
  lanes:
    fresh:
      max_age_days: 90
      quota: 2
    established:
      max_age_days: 1095
      quota: 3
    classic:
      quota: 1
    fill_order:
      - "fresh"
      - "established"
      - "classic"
    allow_underfill: true
  history:
    index_path: "state/paper_index.json"
    classic_backlog_path: "state/classic_backlog.json"
    recommended_cooldown_days: 60
    classic_recommended_cooldown_days: 21
  classics:
    enabled: true
    cadence_days: 3
    anchor_date: "2026-03-07"
    random_seed: "systems-classics-v1"
  venue_sources:
    enabled: true
    provider: "dblp"
    max_hits_per_query: 25
    max_candidates: 80
    request_interval_seconds: 1.5
    recent_years: 5
    prefer_open_access_pdf: true
    venues:
      - name: "PLDI"
        aliases: ["PLDI", "Programming Language Design and Implementation"]
        query_aliases: ["PLDI"]
        priority: 5
      - name: "CGO"
        aliases: ["CGO", "Code Generation and Optimization"]
        query_aliases: ["CGO"]
        priority: 5
      - name: "PPoPP"
        aliases: ["PPoPP", "Principles and Practice of Parallel Programming"]
        query_aliases: ["PPoPP"]
        priority: 5
      - name: "SC"
        aliases: ["SC", "Supercomputing"]
        query_aliases: ["International Conference for High Performance Computing, Networking, Storage and Analysis"]
        priority: 5
      - name: "ASPLOS"
        aliases: ["ASPLOS"]
        query_aliases: ["ASPLOS"]
        priority: 5
      - name: "ISCA"
        aliases: ["ISCA"]
        query_aliases: ["ISCA"]
        priority: 4
      - name: "MICRO"
        aliases: ["MICRO"]
        query_aliases: ["MICRO"]
        priority: 4
      - name: "HPCA"
        aliases: ["HPCA"]
        query_aliases: ["HPCA"]
        priority: 4
      - name: "OSDI"
        aliases: ["OSDI"]
        query_aliases: ["OSDI"]
        priority: 5
      - name: "SOSP"
        aliases: ["SOSP"]
        query_aliases: ["SOSP"]
        priority: 5
      - name: "NSDI"
        aliases: ["NSDI"]
        query_aliases: ["NSDI"]
        priority: 5
      - name: "USENIX ATC"
        aliases: ["ATC", "USENIX ATC", "USENIX Annual Technical Conference"]
        query_aliases: ["USENIX ATC"]
        priority: 5
      - name: "EuroSys"
        aliases: ["EuroSys"]
        query_aliases: ["EuroSys"]
        priority: 5
      - name: "MLSys"
        aliases: ["MLSys", "Machine Learning and Systems"]
        query_aliases: ["MLSys"]
        priority: 5
    query_groups:
      - "llm inference|serving|prefill|decode|speculative|kv cache|vllm|runtime"
      - "flashattention|attention kernel|kernel pipelining|cuda|triton|tensor core|compiler"
      - "quantization|4bit|ptx|sass|assembly|code generation|latency|throughput"
  categories:
    - "cs.LG"
    - "cs.CL"
    - "cs.PL"
    - "cs.DC"
    - "cs.AR"
    - "cs.SE"
  skip_hot_papers: false
  scoring:
    relevance_title_keyword_boost: 0.8
    relevance_summary_keyword_boost: 0.35
    relevance_category_match_boost: 0.8
    popularity_influential_citation_full_score: 100
    priority_bonus_per_level: 0.2
    max_priority_bonus: 0.8
    recency_thresholds:
      - days: 30
        score: 3.0
      - days: 90
        score: 2.0
      - days: 180
        score: 1.0
    weights_normal:
      relevance: 0.55
      recency: 0.20
      popularity: 0.15
      quality: 0.10
    weights_hot:
      relevance: 0.50
      recency: 0.10
      popularity: 0.25
      quality: 0.15

assets:
  enabled: true
  auto_extract_top_n: 1
  max_images_per_paper: 0
  refresh_existing: false
  graph_enabled: true
  max_graph_related: 3

