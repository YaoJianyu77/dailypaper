# Example configuration for the GitHub-hosted daily paper site.

site:
  title: "DailyPaper"
  timezone: "America/New_York"
  base_url: ""

build:
  output_dir: "dist"
  content_dir: "content"

ai:
  enabled: true
  provider: "github_models"
  model: "auto"
  skill_paths:
    - "skills/daily-paper-search/SKILL.md"
    - "skills/daily-paper-editor/SKILL.md"
    - "skills/paper-note-search/SKILL.md"
    - "skills/paper-deep-analysis/SKILL.md"
    - "skills/paper-image-extractor/SKILL.md"
  github_models_api_base: "https://models.github.ai"
  github_models_paper_limit: 10
  github_models_abstract_chars: 1200
  codex_paper_limit: 10
  codex_abstract_chars: 2200
  codex_timeout_seconds: 1200
  preferred_models:
    - "openai/gpt-5.4"
    - "openai/gpt-5"
    - "openai/gpt-4.1"
    - "openai/gpt-4o"
  timeout_seconds: 240
  max_output_tokens: 7000
  editorial_preferences:
    audience: "关注大模型、Agent、多模态系统与高价值方法论文的研究者和工程师"
    tone: "简洁、直接、高信息密度，少空话"
    overview_goal: "先点出今天最值得读的主线，再给阅读顺序建议"
    daily_brief_style: "像研究日报编辑，不像宣传文案"
    prioritize:
      - "为什么这篇论文现在值得读"
      - "方法或问题定义的新意在哪里"
      - "最大的风险、边界或摘要未说明之处"
    avoid:
      - "空泛赞美"
      - "复述标题"
      - "编造实验细节、数字或作者背景"
    custom_instruction: ""

analysis:
  enabled: true
  top_n: 1
  refresh_existing: false
  max_full_text_chars: 36000
  section_char_budget: 7000
  pdf_page_limit: 18

search:
  max_results: 200
  top_n: 10
  recent_window_days: 30
  hot_window_days: 365
  hot_exclude_recent_days: 30
  hot_top_k_per_category: 5
  hot_fallback_max_results: 100
  metadata_fallbacks:
    google_scholar_enabled: true
    google_scholar_request_interval_seconds: 4.0
    google_scholar_min_title_similarity: 0.72
  lanes:
    fresh:
      max_age_days: 90
      quota: 3
    established:
      max_age_days: 1095
      quota: 2
    classic:
      quota: 1
    fill_order:
      - "fresh"
      - "established"
      - "classic"
    allow_underfill: true
  history:
    index_path: "state/paper_index.json"
    classic_backlog_path: "state/classic_backlog.json"
    recommended_cooldown_days: 60
    classic_recommended_cooldown_days: 21
    analyzed_cooldown_days: 365
  classics:
    enabled: true
    cadence_days: 3
    anchor_date: "2026-03-07"
    random_seed: "systems-classics-v1"
    allow_full_analysis: false
  venue_sources:
    enabled: true
    provider: "dblp"
    max_hits_per_query: 25
    max_candidates: 80
    request_interval_seconds: 1.5
    recent_years: 5
    prefer_open_access_pdf: true
    venues:
      - name: "PLDI"
        aliases: ["PLDI", "Programming Language Design and Implementation"]
        query_aliases: ["PLDI"]
        priority: 5
      - name: "CGO"
        aliases: ["CGO", "Code Generation and Optimization"]
        query_aliases: ["CGO"]
        priority: 5
      - name: "PPoPP"
        aliases: ["PPoPP", "Principles and Practice of Parallel Programming"]
        query_aliases: ["PPoPP"]
        priority: 5
      - name: "SC"
        aliases: ["SC", "Supercomputing"]
        query_aliases: ["International Conference for High Performance Computing, Networking, Storage and Analysis"]
        priority: 5
      - name: "ASPLOS"
        aliases: ["ASPLOS"]
        query_aliases: ["ASPLOS"]
        priority: 5
      - name: "ISCA"
        aliases: ["ISCA"]
        query_aliases: ["ISCA"]
        priority: 4
      - name: "MICRO"
        aliases: ["MICRO"]
        query_aliases: ["MICRO"]
        priority: 4
      - name: "HPCA"
        aliases: ["HPCA"]
        query_aliases: ["HPCA"]
        priority: 4
      - name: "OSDI"
        aliases: ["OSDI"]
        query_aliases: ["OSDI"]
        priority: 5
      - name: "SOSP"
        aliases: ["SOSP"]
        query_aliases: ["SOSP"]
        priority: 5
      - name: "NSDI"
        aliases: ["NSDI"]
        query_aliases: ["NSDI"]
        priority: 5
      - name: "USENIX ATC"
        aliases: ["ATC", "USENIX ATC", "USENIX Annual Technical Conference"]
        query_aliases: ["USENIX ATC"]
        priority: 5
      - name: "EuroSys"
        aliases: ["EuroSys"]
        query_aliases: ["EuroSys"]
        priority: 5
      - name: "MLSys"
        aliases: ["MLSys", "Machine Learning and Systems"]
        query_aliases: ["MLSys"]
        priority: 5
    query_groups:
      - "llm inference|serving|prefill|decode|speculative|kv cache|vllm|runtime"
      - "flashattention|attention kernel|kernel pipelining|cuda|triton|tensor core|compiler"
      - "quantization|4bit|ptx|sass|assembly|code generation|latency|throughput"
  categories:
    - "cs.AI"
    - "cs.LG"
    - "cs.CL"
    - "cs.CV"
    - "cs.MM"
    - "cs.MA"
    - "cs.RO"
  skip_hot_papers: false
  scoring:
    relevance_title_keyword_boost: 0.6
    relevance_summary_keyword_boost: 0.3
    relevance_category_match_boost: 0.7
    popularity_influential_citation_full_score: 100
    priority_bonus_per_level: 0.15
    max_priority_bonus: 0.6
    recency_thresholds:
      - days: 30
        score: 3.0
      - days: 90
        score: 2.0
      - days: 180
        score: 1.0
    weights_normal:
      relevance: 0.40
      recency: 0.20
      popularity: 0.30
      quality: 0.10
    weights_hot:
      relevance: 0.35
      recency: 0.10
      popularity: 0.45
      quality: 0.10

assets:
  enabled: true
  auto_extract_top_n: 1
  max_images_per_paper: 0
  refresh_existing: false
  graph_enabled: true
  max_graph_related: 3

research_domains:
  "Large Language Models":
    keywords:
      - term: "large language model"
        fields: ["title", "summary"]
        weight: 1.4
      - term: "llm"
        fields: ["title", "summary"]
        weight: 1.3
      - term: "foundation model"
        fields: ["title", "summary"]
        weight: 1.2
      - term: "pre-training"
        fields: ["title", "summary"]
        weight: 1.0
      - term: "post-training"
        fields: ["title", "summary"]
        weight: 1.0
      - term: "speculative decoding"
        fields: ["title", "summary"]
        weight: 1.1
      - term: "instruction tuning"
        fields: ["title", "summary"]
        weight: 1.0
    negative_keywords:
      - term: "time series"
      - term: "forecasting"
      - term: "hepatology"
      - term: "intraoperative"
    required_signal_keywords:
      - term: "speculative decoding"
      - term: "kv cache"
      - term: "flashattention"
      - term: "serving"
    bonus_keywords:
      - term: "latency"
      - term: "throughput"
      - term: "memory"
    analysis_keywords:
      - term: "benchmark"
      - term: "baseline"
      - term: "ablation"
      - term: "evaluation"
    min_required_signal_matches: 1
    required_signal_bonus_per_match: 0.35
    max_required_signal_bonus: 0.9
    bonus_keyword_bonus_per_match: 0.18
    max_bonus_keyword_bonus: 0.5
    arxiv_categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    require_text_match: true
    min_keyword_matches: 1
    min_score: 1.5
    priority: 5

  "Multimodal":
    keywords:
      - term: "multimodal"
        fields: ["title", "summary"]
        weight: 1.3
      - term: "vision-language"
        fields: ["title", "summary"]
        weight: 1.2
      - term: "image-text"
        fields: ["title", "summary"]
        weight: 1.1
      - term: "visual reasoning"
        fields: ["title", "summary"]
        weight: 1.1
      - term: "cross-modal"
        fields: ["title", "summary"]
        weight: 1.0
      - term: "speech"
        fields: ["title", "summary"]
        weight: 0.9
    arxiv_categories:
      - "cs.CV"
      - "cs.MM"
      - "cs.CL"
    require_text_match: true
    min_score: 1.2
    priority: 4

  "Agents":
    keywords:
      - term: "agent"
        fields: ["title", "summary"]
        weight: 1.1
      - term: "multi-agent"
        fields: ["title", "summary"]
        weight: 1.2
      - term: "orchestration"
        fields: ["title", "summary"]
        weight: 1.0
      - term: "autonomous"
        fields: ["title", "summary"]
        weight: 1.0
      - term: "planning"
        fields: ["title", "summary"]
        weight: 0.9
      - term: "tool use"
        fields: ["title", "summary"]
        weight: 1.0
    arxiv_categories:
      - "cs.AI"
      - "cs.MA"
      - "cs.RO"
    require_text_match: true
    min_score: 1.1
    priority: 4

excluded_keywords:
  - "3D"
  - "review"
  - "workshop"
  - "survey"
