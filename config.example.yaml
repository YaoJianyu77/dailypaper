# Example configuration for the GitHub-hosted daily paper site.

site:
  title: "Evil Read ArXiv"
  timezone: "America/New_York"
  base_url: ""

build:
  output_dir: "dist"
  content_dir: "content"

ai:
  enabled: true
  provider: "github_models"
  model: "auto"
  github_models_api_base: "https://models.github.ai"
  preferred_models:
    - "openai/gpt-5"
    - "openai/gpt-4.1"
    - "openai/gpt-4o"
  timeout_seconds: 180
  max_output_tokens: 5000

search:
  max_results: 200
  top_n: 10
  categories:
    - "cs.AI"
    - "cs.LG"
    - "cs.CL"
    - "cs.CV"
    - "cs.MM"
    - "cs.MA"
    - "cs.RO"
  skip_hot_papers: false

assets:
  max_images_per_paper: 5

research_domains:
  "Large Language Models":
    keywords:
      - "pre-training"
      - "foundation model"
      - "large language model"
      - "LLM"
      - "transformer"
    arxiv_categories:
      - "cs.AI"
      - "cs.LG"
      - "cs.CL"
    priority: 5

  "Multimodal":
    keywords:
      - "vision-language"
      - "multimodal"
      - "image-text"
      - "visual reasoning"
      - "cross-modal"
    arxiv_categories:
      - "cs.CV"
      - "cs.MM"
      - "cs.CL"
    priority: 4

  "Agents":
    keywords:
      - "agent"
      - "multi-agent"
      - "orchestration"
      - "autonomous"
      - "planning"
    arxiv_categories:
      - "cs.AI"
      - "cs.MA"
      - "cs.RO"
    priority: 4

excluded_keywords:
  - "3D"
  - "review"
  - "workshop"
  - "survey"
